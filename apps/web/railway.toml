# Railway service config — Next.js Frontend
# This service must build from the repository root because the web Dockerfile
# copies npm workspace packages from ./packages and ./apps/web.
# Railway dashboard:
# - Root Directory: leave empty or "/"
# - Config file path: /apps/web/railway.toml
# - Dockerfile path is relative to the repository root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
startCommand = "/app/node_modules/.bin/next start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
