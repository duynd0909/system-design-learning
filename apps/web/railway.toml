# Railway service config — Next.js Frontend
# In Railway dashboard: set this service's Root Directory to "apps/web"
# The Dockerfile path below is relative to the repository root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
startCommand = "/app/node_modules/.bin/next start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
