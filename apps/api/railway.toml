# Railway service config — NestJS API
# This service must build from the repository root because the API Dockerfile
# copies npm workspace packages from ./packages and ./apps/api.
# Railway dashboard:
# - Root Directory: leave empty or "/"
# - Config file path: /apps/api/railway.toml
# - Dockerfile path is relative to the repository root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Overrides Dockerfile CMD (optional — CMD in Dockerfile is the source of truth)
startCommand = "node dist/main.js"
preDeployCommand = ["npx prisma migrate deploy"]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Run DB migration before starting the server on each deploy.
# Railway executes this in a one-off container before routing traffic.
# Comment out if you prefer to run migrations manually via:
# railway run --service api npx prisma migrate deploy
